spring.application.name=burnt-toast
spring.datasource.url=jdbc:mysql://localhost:3306/burnttoastdb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
jwt.secret=${JWT_SECRET}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8081